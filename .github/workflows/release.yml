name: release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Extract version
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Restore
        run: dotnet restore src

      - name: Build
        run: dotnet build src --configuration Release --no-restore /p:Version=${{ steps.version.outputs.VERSION }}

      - name: Test
        run: dotnet test src --configuration Release --no-build /p:Version=${{ steps.version.outputs.VERSION }}

      - name: Pack
        run: dotnet pack src/SmoothLingua/SmoothLingua.csproj --configuration Release --no-build /p:Version=${{ steps.version.outputs.VERSION }} --output ./nupkgs

      - name: Push to NuGet
        run: dotnet nuget push ./nupkgs/*.nupkg --source https://api.nuget.org/v3/index.json --api-key ${{ secrets.NUGET_TOKEN }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: ./nupkgs/*.nupkg
